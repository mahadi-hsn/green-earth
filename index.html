<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- Daisy UI, Tailwind and CSS integration -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>
    <h1 class="text-5xl text-center text-white font-semibold bg-green-200 py-4 mb-8 cursor-pointer">Choose your tree
    </h1>


    <section class="w-11/12 mx-auto grid grid-cols-12 gap-4">

        <!-- Category Section -->
        <div class="col-span-2 space-y-3 sticky top-8">
            <div id="categoryContainer" class="space-y-3 sticky top-8">
                <h1 class="text-xl font-bold text-center">Categories</h1>
                <button id="allCategory" onclick="loadAllPlants()" class="btn btn-success w-full active">All
                    Categories</button>
            </div>
        </div>

        <!-- Tree Section -->
        <div class="col-span-8">

            <div id="treeContainer" class="grid grid-cols-3 gap-4"></div>

            <!-- Loading spinner -->
            <div id="LoadingSpinner" class="flex h-[60vh] justify-center items-center hidden">
                <span class="loading loading-ball loading-xl"></span>
            </div>

            <!-- Modal -->
            <dialog id="plantModal" class="modal"></dialog>

        </div>

        <!-- Add to cart -->
        <div class="card card-body shadow-xl bg-green-200 text-white col-span-2">
            <h2 class="text-center text-xl font-bold">Cart</h2>

            <div id="cartContainer" class="space-y-4">     
               
            </div>

            <!-- Total Price -->
            <div class="flex-row justify-between items-center card shadow-lg bg-slate-400 p-4 my-4">
                <span>Total</span>
                <span id="totalPrice">$0</span>
            </div>
        </div>
    </section>


    <script src="script.js"></script>
</body>

</html>
